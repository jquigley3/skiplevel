id: HARNESS-006
title: "Reconcile tasks.md with tasks/*.yaml"
description: >
  The project currently has two task tracking systems: tasks.md (human-readable
  checklist) and tasks/*.yaml (machine-readable task files). Decide the single
  source of truth and document the convention. Options: (a) tasks.md is
  authoritative, YAML files are generated from it; (b) YAML files are
  authoritative, tasks.md is a generated view; (c) both coexist with clear
  roles. Write a design note explaining the decision and update the project
  README.md to document the convention. Also reconcile any discrepancies
  between the current tasks.md and existing YAML files (HARNESS-001 through
  HARNESS-005 status).
status: in-progress
priority: P1
