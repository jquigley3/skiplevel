id: HARNESS-007
title: "Add git log summary to orchestrator post-task logging"
description: >
  After a sub-agent completes a task, the orchestrator should log a git log
  summary showing what commits the sub-agent made. Add a call after the
  completion gitCommit in orchestrator.ts that runs
  `git log --oneline -20` in the project directory and logs the output.
  This gives visibility into sub-agent work without reading individual files.
  Keep it best-effort (don't fail if git isn't initialized).
