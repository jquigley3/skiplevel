name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: ./dev.sh build-dev

      - name: Typecheck
        run: ./dev.sh typecheck

      - name: Tests
        run: ./dev.sh test
